<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المرجع الرسمي لمدد الباندات والعقوبات - Nice City</title>
    <style>
        :root {
            --bg-color: #0d0907;
            --card-bg: #1c120c;
            --primary-orange: #ff5500;
            --text-color: #ffffff;
            --text-muted: #e0e0e0;
            --input-bg: #26170f;
            --green-bar: #00ff66;
            --red-delete: #ff3333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .admin-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
            transition: 0.3s;
        }
        .admin-btn.active {
            background-color: #00ff66;
            color: black;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: linear-gradient(135deg, #2b160a 0%, #170b04 100%);
            border: 2px solid var(--primary-orange);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.15);
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-orange);
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
        }

        .header-container h1 {
            color: var(--primary-orange);
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        .header-container p {
            color: var(--text-muted);
            margin: 0;
            font-size: 16px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
            text-align: center;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            background-color: var(--input-bg);
            border: 1px solid #4a2714;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 10px rgba(255, 85, 0, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #3d2112;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        .card-title {
            color: var(--primary-orange);
            text-align: center;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #4a2714;
        }

        .section-title {
            color: #ffaa66;
            font-size: 14px;
            font-weight: bold;
            margin: 15px 0 10px 0;
            text-decoration: underline;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .item-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .law-item {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-muted);
            border-right: 3px solid transparent;
        }

        .punish-item {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            color: #fff;
            border-right: 4px solid var(--green-bar);
        }

        .add-btn {
            display: none;
            background-color: #2b4c16;
            color: #00ff66;
            border: 1px dashed #00ff66;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            width: 100%;
        }

        .delete-btn {
            display: none;
            background-color: var(--red-delete);
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-card-btn {
            display: none;
            background-color: #5a1111;
            color: #ff9999;
            border: 1px dashed #ff3333;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .global-add-container {
            max-width: 1400px;
            margin: 30px auto;
            text-align: center;
        }

        .add-card-global-btn {
            display: none;
            background-color: #1a3a5c;
            color: #3399ff;
            border: 2px dashed #3399ff;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .edit-active [contenteditable="true"] {
            outline: 2px dashed var(--primary-orange) !important;
            background-color: rgba(255, 85, 0, 0.1) !important;
        }
     .add-btn, .delete-btn, .delete-card-btn, .add-card-global-btn {
    display: none !important;
}

body.edit-active .add-btn,
body.edit-active .delete-btn,
body.edit-active .delete-card-btn,
body.edit-active .add-card-global-btn {
    display: inline-block !important;
}
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <button class="admin-btn" id="adminToggleBtn" onclick="handleAdminMode()">دخول الإدارة 🔐</button>

    <div class="header-container">
        <img src="Nice1.jpg" alt="Nice City Logo" class="logo-img">
        <h1 id="mainTitle" contenteditable="false">المرجع الرسمي لمدد الباندات والعقوبات - سيرفر Nice City</h1>
        <p id="mainSubtitle" contenteditable="false">السلام عليكم ورحمة الله وبركاته - المرجع الشامل والمنظم للإدارة واللاعبين</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" onkeyup="searchLaws()" placeholder="🔍 اكتب اسم المخالفة لإظهار مدة الباند فوراً...">
    </div>

    <div class="grid-container" id="mainGridContainer">
         <p style="text-align: center; color: var(--primary-orange); font-weight: bold;">جاري تحميل القوانين والقوائم من الداتابيز...</p>
    </div>

    <div class="global-add-container">
        <button class="add-card-global-btn" onclick="createNewCard()">➕ إضافة قائمة (مجموعة) قوانين جديدة</button>
    </div>

    <script>
        // ==========================================
        // تم نقل وتحديث بيانات الـ Firebase الخاصة بك هنا بشكل صحيح 🚀
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCUuCbL4zhy6BZNT2J4j_y7A0bnqgDQM3Q",
            authDomain: "banned-8d33b.firebaseapp.com",
            databaseURL: "https://banned-8d33b-default-rtdb.firebaseio.com/",
            projectId: "banned-8d33b",
            storageBucket: "banned-8d33b.firebasestorage.app",
            messagingSenderId: "447642928783",
            appId: "1:447642928783:web:239ba1feaaa5c066f252fa",
            measurementId: "G-M4HG087BZD"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ADMIN_PASSWORD = "aaz1234axlo7"; 
        let isEditMode = false;

        // القراءة والمزامنة التلقائية
        database.ref('niceCityData').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if(data.gridHtml) document.getElementById('mainGridContainer').innerHTML = data.gridHtml;
                if(data.title) document.getElementById('mainTitle').innerText = data.title;
                if(data.subtitle) document.getElementById('mainSubtitle').innerText = data.subtitle;
                setEditable(isEditMode);
            } else {
                initDefaultData();
            }
        });

        function handleAdminMode() {
            const btn = document.getElementById('adminToggleBtn');
            
            if (!isEditMode) {
                let passwordInput = prompt("الرجاء إدخال كلمة مرور الإدارة للتعديل:");
                
                if (passwordInput === ADMIN_PASSWORD) {
                    isEditMode = true;
                    document.body.classList.add('edit-active');
                    btn.innerText = "حفظ ونشر التعديل للجميع 🌍💾";
                    btn.classList.add('active');
                    setEditable(true);
                } else {
                    alert("❌ كلمة المرور خاطئة!");
                }
            } else {
                isEditMode = false;
                document.body.classList.remove('edit-active');
                btn.innerText = "دخول الإدارة 🔐";
                btn.classList.remove('active');
                setEditable(false);

                database.ref('niceCityData').set({
                    gridHtml: document.getElementById('mainGridContainer').innerHTML,
                    title: document.getElementById('mainTitle').innerText,
                    subtitle: document.getElementById('mainSubtitle').innerText
                }).then(() => {
                    alert("🌍 تم التحديث والنشر بنجاح لجميع اللاعبين والموقع!");
                }).catch((error) => {
                    alert("خطأ في حفظ البيانات: " + error.message);
                });
            }
        }

        function setEditable(state) {
            const editableElements = document.querySelectorAll('.card-title, .law-item, .punish-item, #mainTitle, #mainSubtitle');
            editableElements.forEach(el => {
                el.setAttribute('contenteditable', state ? "true" : "false");
            });
        }

        function addNewItem(buttonEl, className) {
            const itemList = buttonEl.previousElementSibling;
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            
            const newItem = document.createElement('div');
            newItem.className = className;
            newItem.setAttribute('contenteditable', "true");
            newItem.innerText = className === 'law-item' ? "اسم المخالفة الجديدة..." : "مدة العقوبة الجديدة...";
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.style.display = 'inline-block';
            deleteBtn.innerText = '❌';
            deleteBtn.onclick = function() { wrapper.remove(); };
            
            wrapper.appendChild(newItem);
            wrapper.appendChild(deleteBtn);
            itemList.appendChild(wrapper);
        }

        function createNewCard() {
            const grid = document.getElementById('mainGridContainer');
            const newCard = document.createElement('div');
            newCard.className = 'card';
            
            newCard.innerHTML = `
                <h3 class="card-title" contenteditable="true">اسم القائمة الجديدة</h3>
                <div class="section-title">المخالفات:</div>
                <div class="item-list">
                    <div class="item-wrapper"><div class="law-item" contenteditable="true">مخالفة جديدة</div><button class="delete-btn" style="display:inline-block;" onclick="this.parentElement.remove()">❌</button></div>
                </div>
                <button class="add-btn" style="display:inline-block;" onclick="addNewItem(this, 'law-item')">+ إضافة مخالفة</button>

                <div class="section-title punishment-title">العقوبات:</div>
                <div class="item-list punishment-list">
                    <div class="item-wrapper"><div class="punish-item" contenteditable="true">العقوبة...</div><button class="delete-btn" style="display:inline-block;" onclick="this.parentElement.remove()">❌</button></div>
                </div>
                <button class="add-btn" style="display:inline-block;" onclick="addNewItem(this, 'punish-item')">+ إضافة عقوبة</button>
                <button class="delete-card-btn" style="display:inline-block;" onclick="this.parentElement.remove()">❌ حذف هذه القائمة</button>
            `;
            grid.appendChild(newCard);
            setEditable(true);
        }

        function searchLaws() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            
            if (input.trim() === "") {
                for (let i = 0; i < cards.length; i++) {
                    cards[i].style.display = "";
                    let wrappers = cards[i].getElementsByClassName('item-wrapper');
                    for(let j=0; j<wrappers.length; j++) wrappers[j].style.display = "";
                }
                return;
            }

            for (let i = 0; i < cards.length; i++) {
                let matchInCard = false;
                let wrappers = cards[i].getElementsByClassName('item-wrapper');
                
                for (let j = 0; j < wrappers.length; j++) {
                    let lawItem = wrappers[j].querySelector('.law-item');
                    if (lawItem && lawItem.innerText.toLowerCase().includes(input)) {
                        wrappers[j].style.display = "";
                        matchInCard = true;
                    } else if (lawItem) {
                        wrappers[j].style.display = "none";
                    }
                }
                cards[i].style.display = matchInCard ? "" : "none";
            }
        }

        function initDefaultData() {
            document.getElementById('mainGridContainer').innerHTML = `
                <div class="card">
                    <h3 class="card-title" contenteditable="false">مجموعة القوانين الأساسية</h3>
                    <div class="section-title">المخالفات:</div>
                    <div class="item-list">
                        <div class="item-wrapper"><div class="law-item" contenteditable="false">القتل العشوائي (RDM)</div><button class="delete-btn" onclick="this.parentElement.remove()">❌</button></div>
                    </div>
                    <button class="add-btn" onclick="addNewItem(this, 'law-item')">+ إضافة مخالفة</button>
                    <div class="section-title punishment-title">العقوبات:</div>
                    <div class="item-list punishment-list">
                        <div class="item-wrapper"><div class="punish-item" contenteditable="false">المرة الأولى: باند أسبوع</div><button class="delete-btn" onclick="this.parentElement.remove()">❌</button></div>
                    </div>
                    <button class="add-btn" onclick="addNewItem(this, 'punish-item')">+ إضافة عقوبة</button>
                </div>`;
        }
    </script>
</body>
</html>
